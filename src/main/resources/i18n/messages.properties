# =============================================================================
# INTERNATIONALIZATION MESSAGES - messages.properties (ENGLISH)
# =============================================================================
# This file contains all application messages for error handling, validation,
# and user feedback. Messages are used in conjunction with MessageSource for
# i18n support across the application.
#
# Convention: messages.properties = English (default)
#             messages_es.properties = Spanish
#             messages_fr.properties = French, etc.
# =============================================================================

# ============================================================================
# AUTHENTICATION - General
# ============================================================================
auth.unauthorized=Permission denied for this resource
auth.unauthorized.code=AUTH_UNAUTHORIZED
error.token.expired=Token expired
error.token.invalid=Invalid Token

# ============================================================================
# AUTHENTICATION - Account/Password Exceptions
# ============================================================================
auth.error.user_not_found=User account not found. Please check your email or register if you don't have an account
auth.error.incorrect_password=The password you entered is incorrect. Please try again
auth.error.same_password=The new password must be different from your current password
auth.error.invalid_credentials=Invalid email or password. Please try again

# ============================================================================
# AUTHENTICATION - Spring Security Exceptions
# ============================================================================
auth.error.bad_credentials=Invalid credentials. Authentication failed
auth.error.account_disabled=This account has been disabled. Please contact support
auth.error.account_locked=This account has been locked due to multiple failed login attempts. Please try again later

# ============================================================================
# AUTHENTICATION - Refresh Token Exceptions
# ============================================================================
auth.error.refresh_token_not_found=Refresh token not found or has been invalidated. Please login again
auth.error.refresh_token_compromised=Your refresh token has been compromised. For security, all sessions have been invalidated. Please login again
auth.error.refresh_token_expired=Your refresh token has expired. Please login again to get a new token

# ============================================================================
# VALIDATION - General
# ============================================================================
validation.error.field_required=This field is required
validation.error.invalid_format=Invalid format
validation.error.field_too_short=This field is too short
validation.error.field_too_long=This field is too long

# ============================================================================
# VALIDATION - Email
# ============================================================================
validation.error.email_invalid=Please enter a valid email address
validation.error.email_already_exists=An account with this email already exists

# ============================================================================
# VALIDATION - Password
# ============================================================================
validation.error.password_too_weak=Password must be at least 8 characters and contain uppercase, lowercase, and numbers
validation.error.password_invalid=Password must contain at least one uppercase letter, one lowercase letter, and one digit

# ============================================================================
# SUCCESS MESSAGES
# ============================================================================
success.password_changed=Your password has been changed successfully
success.account_created=Account created successfully. You can now login
success.token_refreshed=Token refreshed successfully

# ============================================================================
# ERROR - General
# ============================================================================
error.internal_server_error=An unexpected error occurred. Please try again later
error.bad_request=Invalid request. Please check your input
error.not_found=The requested resource was not found
error.song.not_found=Song not found
error.forbidden=You do not have permission to access this resource
error.song.not_accesible=Archive not accesible