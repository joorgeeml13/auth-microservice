# =============================================================================
# MENSAJES DE INTERNACIONALIZACIÓN - messages_es.properties (ESPAÑOL)
# =============================================================================
# Este archivo contiene todos los mensajes de la aplicación para manejo de
# errores, validación y retroalimentación al usuario. Los mensajes se utilizan
# en conjunto con MessageSource para soporte i18n en toda la aplicación.
#
# Convención: messages.properties = Inglés (por defecto)
#             messages_es.properties = Español
#             messages_fr.properties = Francés, etc.
# =============================================================================

# ============================================================================
# AUTENTICACIÓN - General
# ============================================================================
auth.unauthorized=Permiso denegado para este recurso
auth.unauthorized.code=AUTH_UNAUTHORIZED
error.token.expired=Token caducado
error.token.invalid=Token Invalido

# ============================================================================
# AUTENTICACIÓN - Excepciones de Cuenta/Contraseña
# ============================================================================
auth.error.user_not_found=Cuenta de usuario no encontrada. Verifica tu correo o regístrate si no tienes una cuenta
auth.error.incorrect_password=La contraseña que ingresaste es incorrecta. Por favor intenta de nuevo
auth.error.same_password=La nueva contraseña debe ser diferente de tu contraseña actual
auth.error.invalid_credentials=Correo o contraseña inválidos. Por favor intenta de nuevo

# ============================================================================
# AUTENTICACIÓN - Excepciones de Spring Security
# ============================================================================
auth.error.bad_credentials=Credenciales inválidas. Autenticación fallida
auth.error.account_disabled=Esta cuenta ha sido deshabilitada. Por favor contacta al soporte
auth.error.account_locked=Esta cuenta ha sido bloqueada debido a múltiples intentos de inicio de sesión fallidos. Por favor intenta más tarde

# ============================================================================
# AUTENTICACIÓN - Excepciones de Refresh Token
# ============================================================================
auth.error.refresh_token_not_found=Token de actualización no encontrado o ha sido invalidado. Por favor inicia sesión nuevamente
auth.error.refresh_token_compromised=Tu token de actualización ha sido comprometido. Por seguridad, todas las sesiones han sido invalidadas. Por favor inicia sesión nuevamente
auth.error.refresh_token_expired=Tu token de actualización ha expirado. Por favor inicia sesión nuevamente para obtener un nuevo token

# ============================================================================
# VALIDACIÓN - General
# ============================================================================
validation.error.field_required=Este campo es requerido
validation.error.invalid_format=Formato inválido
validation.error.field_too_short=Este campo es muy corto
validation.error.field_too_long=Este campo es muy largo

# ============================================================================
# VALIDACIÓN - Correo Electrónico
# ============================================================================
validation.error.email_invalid=Por favor ingresa una dirección de correo válida
validation.error.email_already_exists=Ya existe una cuenta con este correo electrónico

# ============================================================================
# VALIDACIÓN - Contraseña
# ============================================================================
validation.error.password_too_weak=La contraseña debe tener al menos 8 caracteres e incluir mayúsculas, minúsculas y números
validation.error.password_invalid=La contraseña debe contener al menos una letra mayúscula, una minúscula y un número

# ============================================================================
# MENSAJES DE ÉXITO
# ============================================================================
success.password_changed=Tu contraseña ha sido cambiada exitosamente
success.account_created=Cuenta creada exitosamente. Ahora puedes iniciar sesión
success.token_refreshed=Token actualizado exitosamente

# ============================================================================
# ERROR - General
# ============================================================================
error.internal_server_error=Ocurrió un error inesperado. Por favor intenta más tarde
error.bad_request=Solicitud inválida. Por favor verifica tu entrada
error.not_found=El recurso solicitado no fue encontrado
error.song.not_found=No se encontró la canción
error.forbidden=No tienes permiso para acceder a este recurso
